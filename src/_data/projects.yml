- title: Learn You A Haskell
  cover: lyah.png
  desc: >
    Esse projeto é na verdade uma restauração do website learnyouahaskell.com que
    hoje em dia não é mais acessível.
    
    Eu reconstruí ele usando Jekyll enquanto o original ainda estava de pé. Tentei
    deixar ele o mais próximo possível do original.
    
    Se você quiser dar uma olhada, é só acessar:
    https://tukainpng.neocities.org/etc/lyah
  url: https://codeberg.org/tukain/lyah

- title: Blog.sh
  cover: blog.sh.png
  desc: >
    Um gerador de blogs simples feito usando Shell Script.
    
    Este é um projeto que eu comecei a muito tempo atrás e decidi revitalizá-lo.
    
    Coloquei novas funções (como geração automática de um feed RSS, por exemplo) e
    deixei ele mais fácil de utilizar e de customizar.
  url: https://codeberg.org/tukain/blog.sh

- title: "Tabela de conteúdo"
  stat: 0
  content: >
    Cada post deve ter uma tabela de conteúdo com links para cada tópico do post.

    Os tópicos são cada <i>Heading</i> presente no post, assim como funciona

    no <code>org-mode</code>.


    Por exemplo:

    ┌────────────────────┐

    │ TABELA DE CONTEÚDO │

    │ │                  │

    │ ├─ Algum tópico    │

    │ │                  │

    │ └─ Outro tópico    │

    └────────────────────┘

     * Algum tópico

     conteúdo

     * Outro tópico

     conteúdo

- title: "Botão para enviar feedback de um post"
  stat: 2
  content: >
    Ao final de cada post deve haver um botão de feedback com um link

    para e-mail pre-preenchido com algumas informações sobre o post.

    O formato do link é o seguinte:

    mailto:email@example.com?subject=ASSUNTO

- title: "Avaliações para os livros"
  stat: 2
  content: >
    Notas para os livros/mangás que eu li, com a nota variando de 0 a 10.

    Para cada "range" de uma nota, deve haver um emote estilo da Twitch.

    Por exemplo:

    entre 9 e 10 => Senhor cinema

    entre 8 e 9  => pogchamp

    entre 0 e 1  => It's Joever

- title: "Uma página de ideias"
  stat: 2
  content: >
    Uma página contendo todas as minhas ideias para o site

- title: "Página de introdução com uma animação 3D"
  stat: 0
  content: >
    Quando alguém entrar no site, uma página de introdução deve aparecer

    (isso é bem comum no Neocities).


    A página deve ter uma animação em 3D, um cubo que ao ter o mouse encima

    se desmancha e faz alguma outra forma geométrica com os dizeres

    "Bem-vindo!" ou algo do gênero.


    Para mobile, essa abertura pode ser uma animação que rode sozinha e

    mostre a home logo em seguida.

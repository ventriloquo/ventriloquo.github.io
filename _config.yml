title: Caderno do Tukain
lang: pt-br
author: tukain
description: Um blog de um nerd de computador
url: https://tukainpng.neocities.org
enconding: utf-8

collections:
  posts:
    output: true
    permalink: /blog/posts/:year/:month/:day/:slug

defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: "feed.xml"
    values:
      layout: 
  - scope:
      type: posts
    values:
      layout: post

plugins: [jekyll-paginate]

paginate: 9
paginate_path: "/blog/page:num/"

